<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>營造工程專案儀表板</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-900:#042C53;--blue-800:#0C447C;--blue-600:#185FA5;--blue-400:#378ADD;--blue-100:#B5D4F4;--blue-50:#E6F1FB;
  --green-800:#085041;--green-600:#0F6E56;--green-400:#1D9E75;--green-100:#9FE1CB;--green-50:#E1F5EE;
  --amber-800:#633806;--amber-600:#854F0B;--amber-400:#EF9F27;--amber-100:#FAC775;--amber-50:#FAEEDA;
  --red-800:#791F1F;--red-600:#A32D2D;--red-400:#E24B4A;--red-100:#F7C1C1;--red-50:#FCEBEB;
  --purple-800:#3C3489;--purple-100:#CECBF6;--purple-50:#EEEDFE;
  --steel:#2D3748;--concrete:#4A5568;
  --bg:#F4F5F7;--surface:#FFFFFF;--border:#E2E8F0;--border-l:#F0F0F0;
  --text:#1A202C;--text2:#4A5568;--text3:#718096;--text4:#A0AEC0;
  --r-md:8px;--r-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1A1A1A;--surface:#252525;--border:#3A3A3A;--border-l:#2E2E2E;
  --text:#F0EFE8;--text2:#B4B2A9;--text3:#888780;--text4:#5F5E5A;
  --blue-50:#042C53;--blue-100:#0C447C;--green-50:#04342C;--green-100:#085041;
  --amber-50:#412402;--amber-100:#633806;--red-50:#501313;--red-100:#791F1F;--purple-50:#26215C;--purple-100:#3C3489;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.header{background:var(--steel);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.site-pill{background:var(--blue-800);color:var(--blue-100);font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;letter-spacing:.05em;margin-right:8px;white-space:nowrap}
.h-title{color:#fff;font-size:15px;font-weight:600}
.h-sub{color:rgba(255,255,255,.45);font-size:11px;margin-top:1px}
.conn-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.conn-dot.online{background:#1D9E75}
.conn-dot.offline{background:#E24B4A}
.conn-dot.loading{background:#EF9F27;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav{display:flex;background:var(--concrete);border-bottom:1px solid rgba(0,0,0,.2);overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:68px;padding:10px 6px;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit}
.nav-btn.active{color:#fff;border-bottom-color:var(--amber-400)}
.nav-btn:hover:not(.active){color:rgba(255,255,255,.85)}
.content{padding:14px;max-width:900px;margin:0 auto}
.btn{border:1px solid var(--border);background:transparent;border-radius:var(--r-md);padding:7px 12px;font-size:12px;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--border-l)}
.btn.primary{background:var(--blue-800);color:var(--blue-100);border-color:var(--blue-800)}
.btn.primary:hover{background:var(--blue-900)}
.btn.success{background:var(--green-600);color:var(--green-50);border-color:var(--green-600)}
.btn.success:hover{background:var(--green-800)}
.btn.danger{color:var(--red-600);border-color:var(--red-100)}
.btn.sm{padding:4px 9px;font-size:11px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 14px}
.mc-lbl{font-size:11px;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.mc-val{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.mc-sub{font-size:11px;color:var(--text4);margin-top:4px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-ok{background:var(--green-50);color:var(--green-800)}
.b-warn{background:var(--amber-50);color:var(--amber-800)}
.b-err{background:var(--red-50);color:var(--red-800)}
.b-info{background:var(--blue-50);color:var(--blue-800)}
.field{margin-bottom:11px}
.field:last-child{margin-bottom:0}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;-webkit-appearance:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px rgba(55,138,221,.12)}
.field textarea{resize:vertical;min-height:72px;line-height:1.6}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.wx-btn{border:1px solid var(--border);background:var(--bg);border-radius:var(--r-md);padding:9px 4px;font-size:22px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.wx-btn.active{background:var(--blue-50);border-color:var(--blue-400);outline:2px solid var(--blue-400);outline-offset:-1px}
.wx-lbl{font-size:10px;color:var(--text3);margin-top:3px;font-weight:500}
.worker-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-l)}
.worker-row:last-child{border-bottom:none}
.count-wrap{display:flex;align-items:center;gap:7px;margin-left:auto}
.cnt-btn{width:30px;height:30px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-weight:600}
.cnt-btn:active{background:var(--border)}
.cnt-val{width:32px;text-align:center;font-size:16px;font-weight:700;color:var(--text)}
.cnt-unit{font-size:12px;color:var(--text4)}
.pi-item{padding:10px 0;border-bottom:1px solid var(--border-l)}
.pi-item:last-child{border-bottom:none}
.pi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.pi-name{font-size:14px;font-weight:600;color:var(--text);flex:1;background:transparent;border:none;outline:none;font-family:inherit;padding:0;min-width:0}
.pi-pct{font-size:13px;font-weight:700;color:var(--blue-600);margin-left:8px;min-width:36px;text-align:right}
.pi-bar{height:5px;background:var(--bg);border-radius:5px;overflow:hidden;margin-bottom:8px;border:1px solid var(--border-l)}
.pi-fill{height:100%;border-radius:5px;background:var(--blue-800);transition:width .3s}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--blue-600);cursor:pointer;border:2px solid var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.add-btn{width:100%;padding:9px;border:1px dashed var(--border);background:none;border-radius:var(--r-md);font-size:13px;color:var(--text4);cursor:pointer;margin-top:8px;font-family:inherit;font-weight:500}
.add-btn:hover{background:var(--bg)}
.submit-btn{width:100%;padding:12px;background:var(--blue-800);color:var(--blue-100);border:none;border-radius:var(--r-lg);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:background .15s}
.submit-btn:hover{background:var(--blue-900)}
.submit-btn:disabled{background:var(--text4);cursor:not-allowed}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:620px){
  .metrics,.g4{grid-template-columns:1fr 1fr}
  .g2,.g3{grid-template-columns:1fr}
  .field-row{grid-template-columns:1fr}
}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;margin-bottom:10px}
.proj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.proj-stats{display:grid;grid-template-columns:repeat(4,1fr);text-align:center;gap:6px;margin-bottom:8px}
.pstat-val{font-size:16px;font-weight:700;color:var(--text)}
.pstat-lbl{font-size:10px;color:var(--text4);margin-top:2px}
.big-bar{height:7px;background:var(--bg);border-radius:7px;overflow:hidden;border:1px solid var(--border-l)}
.big-fill{height:100%;border-radius:7px;transition:width .4s}
.task-col{background:var(--bg);border-radius:var(--r-lg);padding:10px;min-height:120px}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.col-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.col-cnt{font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1px 7px;color:var(--text4)}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:10px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.task-card:hover{border-color:var(--blue-400)}
.task-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.4}
.task-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid var(--surface)}
.av-a{background:var(--blue-100);color:var(--blue-800)}
.av-b{background:var(--green-100);color:var(--green-800)}
.av-c{background:#F4C0D1;color:#72243E}
.av-d{background:var(--amber-100);color:var(--amber-800)}
.log-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;margin-bottom:8px}
.trend-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border-l)}
.trend-row:last-child{border-bottom:none}
.tbar{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border-l)}
.tbar-fill{height:100%;background:var(--blue-600);border-radius:4px}
.risk-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-l)}
.risk-row:last-child{border-bottom:none}
.risk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.mem-card{background:var(--bg);border-radius:var(--r-md);padding:10px 12px}
.mbar{height:3px;background:var(--border);border-radius:3px;margin-top:6px;overflow:hidden}
.mbar-fill{height:100%;border-radius:3px}
.filter-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ftab{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-weight:500;font-family:inherit;transition:all .15s}
.ftab.active{background:var(--blue-50);color:var(--blue-800);border-color:var(--blue-400)}
.slbl{font-size:10px;font-weight:700;color:var(--text4);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px}
.slbl:first-child{margin-top:0}
.set-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-l)}
.set-row:last-child{border-bottom:none}
.set-row-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:18px;width:460px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:9px 18px;border-radius:24px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.show{opacity:1}
.api-box{background:var(--blue-50);border:1px solid var(--blue-400);border-radius:var(--r-lg);padding:14px;margin-bottom:14px}
.api-label{font-size:12px;font-weight:700;color:var(--blue-800);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.api-input{width:100%;padding:8px 10px;border-radius:var(--r-md);border:1px solid var(--blue-400);background:var(--surface);color:var(--text);font-size:12px;font-family:monospace;word-break:break-all}
.api-input:focus{outline:none;box-shadow:0 0 0 3px rgba(55,138,221,.2)}
.info-banner{background:var(--amber-50);border:1px solid var(--amber-400);border-radius:var(--r-md);padding:10px 13px;font-size:12px;color:var(--amber-800);margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.sync-bar{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;margin-top:2px}
</style>
</head>
<body>

<header class="header">
  <div style="display:flex;align-items:center;min-width:0">
    <span class="site-pill">工地</span>
    <div style="min-width:0">
      <div class="h-title" id="site-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">載入中...</div>
      <div class="sync-bar">
        <span class="conn-dot loading" id="conn-dot"></span>
        <span id="sync-status">連線中...</span>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:6px;flex-shrink:0;margin-left:10px">
    <button class="btn" onclick="syncAll()" title="重新同步" aria-label="重新同步資料"><i class="ti ti-refresh"></i></button>
    <button class="btn primary" onclick="openAddTask()"><i class="ti ti-plus"></i> 新增任務</button>
  </div>
</header>

<nav class="nav" aria-label="主選單">
  <button class="nav-btn active" id="nav-overview"  onclick="switchNav('overview')"><i class="ti ti-layout-dashboard"></i>總覽</button>
  <button class="nav-btn"        id="nav-log"        onclick="switchNav('log')"><i class="ti ti-pencil"></i>填寫日誌</button>
  <button class="nav-btn"        id="nav-history"    onclick="switchNav('history')"><i class="ti ti-history"></i>日誌紀錄</button>
  <button class="nav-btn"        id="nav-tasks"      onclick="switchNav('tasks')"><i class="ti ti-layout-kanban"></i>任務看板</button>
  <button class="nav-btn"        id="nav-settings"   onclick="switchNav('settings')"><i class="ti ti-settings"></i>設定</button>
</nav>

<main class="content">
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- ══ 總覽 ══ -->
  <section id="view-overview">
    <div class="metrics" id="ov-metrics"></div>
    <div class="g2">
      <div>
        <div class="card">
          <div class="card-title"><span><i class="ti ti-building-factory-2"></i> 各工程進度</span></div>
          <div id="ov-projects"></div>
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:12px">
          <div class="card-title"><span><i class="ti ti-trending-up"></i> 近期出工趨勢</span></div>
          <div id="ov-trend"></div>
        </div>
        <div class="card">
          <div class="card-title"><span><i class="ti ti-alert-triangle"></i> 需要注意</span></div>
          <div id="ov-risks"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span><i class="ti ti-users"></i> 成員負載</span></div>
      <div id="ov-members"></div>
    </div>
  </section>

  <!-- ══ 施工日誌 ══ -->
  <section id="view-log" style="display:none">
    <div id="log-offline-banner" class="info-banner" style="display:none">
      <i class="ti ti-wifi-off" style="font-size:16px;flex-shrink:0;margin-top:1px"></i>
      <span>目前為離線模式，日誌將暫存於本機，連線後可至設定頁手動同步。</span>
    </div>
    <p class="slbl">基本資訊</p>
    <div class="card">
      <div class="field-row">
        <div class="field"><label for="log-date">施工日期</label><input type="date" id="log-date"></div>
        <div class="field"><label for="log-sub">填報分包商</label><select id="log-sub"></select></div>
      </div>
      <div class="field">
        <label>天氣狀況</label>
        <div class="wx-grid">
          <div class="wx-btn active" data-wx="晴天" onclick="selWx(this)">☀️<div class="wx-lbl">晴天</div></div>
          <div class="wx-btn" data-wx="多雲" onclick="selWx(this)">⛅<div class="wx-lbl">多雲</div></div>
          <div class="wx-btn" data-wx="陰天" onclick="selWx(this)">☁️<div class="wx-lbl">陰天</div></div>
          <div class="wx-btn" data-wx="雨天" onclick="selWx(this)">🌧️<div class="wx-lbl">雨天</div></div>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label for="log-temp">溫度（℃）</label><input type="number" id="log-temp" placeholder="28" min="-10" max="45"></div>
        <div class="field"><label for="log-status">施工狀況</label>
          <select id="log-status">
            <option>正常施工</option><option>部分施工</option>
            <option>暫停施工（天氣）</option><option>停工（其他）</option>
          </select>
        </div>
      </div>
    </div>
    <p class="slbl">出工人數</p>
    <div class="card"><div id="worker-types"></div></div>
    <p class="slbl">工項進度</p>
    <div class="card">
      <div id="work-items"></div>
      <button class="add-btn" onclick="addWI()"><i class="ti ti-plus"></i> 新增工項</button>
    </div>
    <p class="slbl">備註</p>
    <div class="card">
      <div class="field">
        <label for="log-note">當日備註（問題、異常、材料到場、安全事項）</label>
        <textarea id="log-note" placeholder="填寫今日施工遇到的問題或重要事項..."></textarea>
      </div>
    </div>
    <button class="submit-btn" id="log-submit-btn" onclick="submitLog()">
      <i class="ti ti-device-floppy"></i> 儲存今日日誌
    </button>
  </section>

  <!-- ══ 日誌歷史 ══ -->
  <section id="view-history" style="display:none">
    <div class="filter-tabs">
      <button class="ftab active" onclick="filterH('all',this)">全部</button>
      <button class="ftab" onclick="filterH('issue',this)">有問題</button>
      <button class="ftab" onclick="filterH('rain',this)">雨天</button>
    </div>
    <div id="history-list"></div>
  </section>

  <!-- ══ 任務看板 ══ -->
  <section id="view-tasks" style="display:none">
    <div class="filter-tabs" id="proj-filter-tabs"></div>
    <div class="g3" id="kanban"></div>
    <div id="modal-area"></div>
  </section>

  <!-- ══ 設定 ══ -->
  <section id="view-settings" style="display:none">
    <!-- API 設定 -->
    <div class="api-box">
      <div class="api-label"><i class="ti ti-link"></i> Google Apps Script 網址</div>
      <input class="api-input" type="url" id="set-api" placeholder="https://script.google.com/macros/s/...exec" autocomplete="off" spellcheck="false">
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn primary" onclick="testAndSaveApi()"><i class="ti ti-plug-connected"></i> 測試並連線</button>
        <button class="btn" onclick="clearApiUrl()"><i class="ti ti-trash"></i> 清除</button>
      </div>
    </div>

    <p class="slbl">從 Google Sheets 同步設定</p>

    <div class="card"><div id="proj-list"></div><button class="add-btn" onclick="addProj()"><i class="ti ti-plus"></i> 新增工程專案</button></div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="submit-btn" style="background:var(--green-600)" onclick="saveSettings()">
        <i class="ti ti-device-floppy"></i> 儲存本機設定
      </button>
      <button class="submit-btn" style="flex:0 0 auto;width:auto;padding-left:14px;padding-right:14px" onclick="pushConfigToSheets()" title="將本機設定上傳到 Google Sheets">
        <i class="ti ti-cloud-upload"></i>
      </button>
    </div>
  </section>
</main>

<script>
/* ══ 常數 ══ */
const MEMBERS=[
  {id:'a',name:'陳美玲',cls:'av-a',color:'#185FA5'},
  {id:'b',name:'林志明',cls:'av-b',color:'#1D9E75'},
  {id:'c',name:'王小華',cls:'av-c',color:'#993556'},
  {id:'d',name:'張大偉',cls:'av-d',color:'#854F0B'},
];
const WX={晴天:'☀️',多雲:'⛅',陰天:'☁️',雨天:'🌧️'};
const LOCAL_KEY='const_dash_v2';
const HEALTH_CLS={delayed:'b-err','at-risk':'b-warn','on-track':'b-ok','near-done':'b-info',done:'b-info'};
const HEALTH_LBL={delayed:'逾期','at-risk':'待加速','on-track':'進行順利','near-done':'接近完成',done:'完成'};
const BAR_COL={delayed:'#E24B4A','at-risk':'#EF9F27','on-track':'#1D9E75','near-done':'#185FA5',done:'#B4B2A9'};

/* ══ 狀態 ══ */
let state={
  apiUrl:'',
  siteName:'台中辦公大樓新建工程',projNo:'2025-A-012',
  subcontractors:['統合水電','宏鑫泥作','鴻運鋼筋'],
  trades:['水電工','泥作工','鋼筋工','模板工','雜工'],
  projects:[{id:'p1',name:'地下室工程'},{id:'p2',name:'結構體'},{id:'p3',name:'外牆工程'}],
  tasks:[
    {id:'t1',title:'基礎開挖完成',status:'done',priority:'high',project:'p1',assignees:['a','b'],progress:100,due:'2025-06-20'},
    {id:'t2',title:'地下室防水施作',status:'doing',priority:'high',project:'p1',assignees:['c'],progress:55,due:'2025-07-10'},
    {id:'t3',title:'一樓柱位放樣',status:'doing',priority:'med',project:'p2',assignees:['b','d'],progress:30,due:'2025-07-25'},
    {id:'t4',title:'鋼筋材料進場',status:'todo',priority:'high',project:'p2',assignees:['d'],progress:0,due:'2025-07-15'},
    {id:'t5',title:'外牆磚材選定',status:'todo',priority:'low',project:'p3',assignees:['a'],progress:0,due:'2025-08-01'},
  ],
  logs:[
    {id:'l1',date:'2025-06-20',sub:'宏鑫泥作',weather:'晴天',temp:'32',status:'正常施工',totalWorkers:18,workers:{泥作工:10,模板工:5,雜工:3},items:[{name:'防水底層',progress:40},{name:'模板整修',progress:80}],note:''},
    {id:'l2',date:'2025-06-19',sub:'統合水電',weather:'多雲',temp:'29',status:'正常施工',totalWorkers:12,workers:{水電工:8,雜工:4},items:[{name:'排水管配置',progress:60}],note:''},
    {id:'l3',date:'2025-06-18',sub:'鴻運鋼筋',weather:'雨天',temp:'24',status:'暫停施工（天氣）',totalWorkers:5,workers:{鋼筋工:3,雜工:2},items:[{name:'鋼筋綁紮',progress:25}],note:'上午雨勢較大，下午僅部分施作'},
  ],
  pendingLogs:[], lastSync:null
};
let curWx='晴天', workerCounts={}, workItems=[], isOnline=false;

/* ══ 本機儲存 ══ */
function saveLocal(){try{localStorage.setItem(LOCAL_KEY,JSON.stringify(state));}catch(e){}}
function loadLocal(){try{const d=localStorage.getItem(LOCAL_KEY);if(d){const p=JSON.parse(d);Object.assign(state,p);}}catch(e){}}

/* ══ API 工具 ══ */
async function apiFetch(params,retries=2){
  if(!state.apiUrl)throw new Error('no_api');
  const url=state.apiUrl+'?'+new URLSearchParams(params);
  for(let i=0;i<=retries;i++){
    try{const r=await fetch(url,{cache:'no-cache'});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}
    catch(e){if(i===retries)throw e;await new Promise(r=>setTimeout(r,600*(i+1)));}
  }
}
async function apiPost(data,retries=2){
  if(!state.apiUrl)throw new Error('no_api');
  for(let i=0;i<=retries;i++){
    try{const r=await fetch(state.apiUrl,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}
    catch(e){if(i===retries)throw e;await new Promise(r=>setTimeout(r,600*(i+1)));}
  }
}

/* ══ 連線狀態 UI ══ */
function setOnline(online,msg){
  isOnline=online;
  const dot=document.getElementById('conn-dot');
  const status=document.getElementById('sync-status');
  dot.className='conn-dot '+(online?'online':'offline');
  status.textContent=msg||(online?'已連線 · '+state.siteName:'離線模式');
  document.getElementById('log-offline-banner').style.display=online?'none':'flex';
}
function setLoading(msg){
  document.getElementById('conn-dot').className='conn-dot loading';
  document.getElementById('sync-status').textContent=msg||'同步中...';
}

/* ══ 同步全部資料 ══ */
async function syncAll(){
  if(!state.apiUrl){setOnline(false,'未設定 API 網址');return;}
  setLoading('同步中...');
  try{
    const res=await apiFetch({action:'all'});
    if(!res.success)throw new Error(res.error||'API 錯誤');
    // 套用設定
    const c=res.config||{};
    if(c['工地名稱'])state.siteName=c['工地名稱'];
    if(c['工程編號'])state.projNo=c['工程編號'];
    if(c['分包商清單'])state.subcontractors=String(c['分包商清單']).split(',').filter(Boolean);
    if(c['工種清單'])state.trades=String(c['工種清單']).split(',').filter(Boolean);
    if(c['工項清單']&&c['工項清單'].length)state.workItemTemplates=c['工項清單'];
    // 套用日誌
    if(res.logs&&res.logs.length)state.logs=res.logs;
    // 套用任務
    if(res.tasks&&res.tasks.length)state.tasks=res.tasks;
    // 套用專案
    if(res.projects&&res.projects.length)state.projects=res.projects;
    state.lastSync=new Date().toLocaleString('zh-TW');
    saveLocal();
    setOnline(true,'已同步 · '+state.lastSync);
    // 送出暫存的離線日誌
    if(state.pendingLogs&&state.pendingLogs.length){
      for(const log of state.pendingLogs){
        try{await apiPost({action:'log',...log});}catch(e){}
      }
      state.pendingLogs=[];saveLocal();showToast('✓ 離線日誌已同步');
    }
    applyConfig();renderAll();
  }catch(e){
    setOnline(false,'離線模式 · '+new Date().toLocaleTimeString('zh-TW'));
    if(e.message!=='no_api')showToast('⚠️ 無法連線，使用本機資料');
  }
}

/* ══ 測試 API 並儲存 ══ */
async function testAndSaveApi(){
  const url=document.getElementById('set-api').value.trim();
  if(!url){showToast('請輸入 API 網址');return;}
  setLoading('測試連線中...');
  state.apiUrl=url;saveLocal();
  try{
    const res=await apiFetch({action:'config'});
    if(!res.success)throw new Error(res.error);
    showToast('✅ 連線成功！正在同步資料...');
    await syncAll();
  }catch(e){
    setOnline(false,'連線失敗');
    showToast('❌ 連線失敗，請確認網址是否正確\n'+e.message);
  }
}
function clearApiUrl(){state.apiUrl='';saveLocal();document.getElementById('set-api').value='';setOnline(false,'尚未設定 API');}

/* ══ 初始化 ══ */
function initAll(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('site-name').textContent=state.siteName;
  document.getElementById('log-date').value=today;
  document.getElementById('set-api').value=state.apiUrl||'';
  applyConfig();
  workerCounts={};state.trades.forEach(t=>{workerCounts[t]=0;});
  workItems=[{name:'今日主要工項',progress:0,note:''}];
  renderWTs();renderWIs();
  renderAll();
  if(state.apiUrl)syncAll();
  else setOnline(false,'尚未設定 API 網址，請至設定頁填入');
}

function applyConfig(){
  document.getElementById('site-name').textContent=state.siteName;
  const ss=document.getElementById('log-sub');
  ss.innerHTML=state.subcontractors.map(s=>`<option>${s}</option>`).join('');
  document.getElementById('set-site').value=state.siteName;
  document.getElementById('set-no').value=state.projNo;
  renderSettingsLists();
}

function renderAll(){renderOverview();renderHistory('all');renderKanban('');}

/* ══ 天氣 ══ */
function selWx(el){document.querySelectorAll('.wx-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');curWx=el.dataset.wx;}

/* ══ 工種計數 ══ */
function chg(t,d){workerCounts[t]=Math.max(0,(workerCounts[t]||0)+d);const el=document.getElementById('wc-'+t.replace(/\W/g,'_'));if(el)el.textContent=workerCounts[t];}
function renderWTs(){
  document.getElementById('worker-types').innerHTML=state.trades.map(t=>`
    <div class="worker-row">
      <span style="font-size:14px;font-weight:600;color:var(--text)">${t}</span>
      <div class="count-wrap">
        <button class="cnt-btn" onclick="chg('${t}',-1)" aria-label="減少">−</button>
        <span class="cnt-val" id="wc-${t.replace(/\W/g,'_')}">${workerCounts[t]||0}</span>
        <button class="cnt-btn" onclick="chg('${t}',1)" aria-label="增加">+</button>
        <span class="cnt-unit">人</span>
      </div>
    </div>`).join('');
}

/* ══ 工項進度 ══ */
function renderWIs(){
  document.getElementById('work-items').innerHTML=workItems.map((it,i)=>`
    <div class="pi-item">
      <div class="pi-top">
        <input class="pi-name" value="${it.name}" onchange="workItems[${i}].name=this.value" placeholder="工項名稱" aria-label="工項名稱">

      </div>

      <input type="range" min="0" max="100" step="5" value="${it.progress}"
        oninput="workItems[${i}].progress=+this.value;document.getElementById('pct${i}').textContent=this.value+'%';document.getElementById('pfill${i}').style.width=this.value+'%'"
        aria-label="${it.name}進度">
    </div>`).join('');
}
function addWI(){workItems.push({name:'新工項',progress:0,note:''});renderWIs();}

/* ══ 提交日誌 ══ */
async function submitLog(){
  const date=document.getElementById('log-date').value;
  if(!date){showToast('請選擇施工日期');return;}
  const totalWorkers=Object.values(workerCounts).reduce((a,b)=>a+b,0);
  const log={id:'l'+Date.now(),date,sub:document.getElementById('log-sub').value,weather:curWx,temp:document.getElementById('log-temp').value||'',status:document.getElementById('log-status').value,totalWorkers,workers:{...workerCounts},items:workItems.map(i=>({...i})),note:document.getElementById('log-note').value};
  state.logs.unshift(log);
  const btn=document.getElementById('log-submit-btn');
  btn.disabled=true;btn.innerHTML='<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle"></span> 儲存中...';
  try{
    if(isOnline){await apiPost({action:'log',...log});showToast('✅ 日誌已儲存至 Google Sheets');}
    else{state.pendingLogs=(state.pendingLogs||[]);state.pendingLogs.push(log);showToast('⚠️ 已暫存本機，恢復連線後自動同步');}
  }catch(e){state.pendingLogs=(state.pendingLogs||[]);state.pendingLogs.push(log);showToast('⚠️ 已暫存本機');}
  saveLocal();
  btn.disabled=false;btn.innerHTML='<i class="ti ti-device-floppy"></i> 儲存今日日誌';
  document.getElementById('log-note').value='';document.getElementById('log-temp').value='';
  Object.keys(workerCounts).forEach(k=>{workerCounts[k]=0;});renderWTs();
  workItems.forEach(i=>{i.progress=0;});renderWIs();
  renderOverview();renderHistory('all');
}

/* ══ 歷史紀錄 ══ */
function renderHistory(filter){
  let logs=[...state.logs];
  if(filter==='issue')logs=logs.filter(l=>(l.note&&l.note.trim())||l.status!=='正常施工');
  if(filter==='rain')logs=logs.filter(l=>l.weather==='雨天');
  const el=document.getElementById('history-list');
  if(!logs.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--text4)"><i class="ti ti-notes-off" style="font-size:28px;display:block;margin-bottom:8px"></i>尚無紀錄</div>';return;}
  const sc=s=>s==='正常施工'?'b-ok':s==='部分施工'?'b-warn':'b-err';
  el.innerHTML=logs.map(l=>{
    const items=(l.items||[]).filter(i=>i.progress>0);
    return`<div class="log-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:14px;font-weight:700;color:var(--text)">${l.date}</span>
          <span style="font-size:12px;color:var(--text3)">${WX[l.weather]||''} ${l.weather||''}${l.temp?' · '+l.temp+'℃':''}</span>
        </div>
        <span class="badge ${sc(l.status)}">${l.status}</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:5px;margin:5px 0 2px">
        <span style="font-size:12px;color:var(--text3)">出工</span>
        <span style="font-size:26px;font-weight:700;color:var(--text);line-height:1">${l.totalWorkers}</span>
        <span style="font-size:12px;color:var(--text3)">人 · ${l.sub}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
        ${items.map(i=>`<span style="font-size:11px;color:var(--text3)"><i class="ti ti-hammer" style="font-size:11px"></i> ${i.name} ${i.progress}%</span>`).join('')}
      </div>
      ${l.note?`<div style="font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border-l);line-height:1.6">💬 ${l.note}</div>`:''}
    </div>`;
  }).join('');
}
function filterH(f,btn){document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderHistory(f);}

/* ══ 總覽 ══ */
function projHealth(tasks){
  if(!tasks.length)return'done';
  const over=tasks.filter(t=>t.status!=='done'&&t.due&&new Date(t.due)<new Date()).length;
  const done=tasks.filter(t=>t.status==='done').length;
  const pct=Math.round(done/tasks.length*100);
  if(over>0)return'delayed';if(pct<30)return'at-risk';if(pct>=80)return'near-done';return'on-track';
}
function renderOverview(){
  const tasks=state.tasks,logs=state.logs;
  const totalW=logs.reduce((a,l)=>a+(Number(l.totalWorkers)||0),0);
  const todayLog=logs[0]&&logs[0].date===new Date().toISOString().split('T')[0]?logs[0]:null;
  const overdue=tasks.filter(t=>t.status!=='done'&&t.due&&new Date(t.due)<new Date()).length;
  const done=tasks.filter(t=>t.status==='done').length;
  document.getElementById('ov-metrics').innerHTML=`
    <div class="mc"><div class="mc-lbl"><i class="ti ti-calendar"></i>記錄天數</div><div class="mc-val">${logs.length}</div><div class="mc-sub">累計出工 ${totalW} 人次</div></div>
    <div class="mc"><div class="mc-lbl"><i class="ti ti-users"></i>今日出工</div><div class="mc-val">${todayLog?todayLog.totalWorkers:'—'}</div><div class="mc-sub">${todayLog?todayLog.sub:'尚未填報'}</div></div>
    <div class="mc"><div class="mc-lbl"><i class="ti ti-checklist"></i>任務完成率</div><div class="mc-val">${tasks.length?Math.round(done/tasks.length*100):0}%</div><div class="mc-sub">${done} / ${tasks.length} 項完成</div></div>
    <div class="mc"><div class="mc-lbl"><i class="ti ti-alarm"></i>逾期任務</div><div class="mc-val" style="${overdue>0?'color:var(--red-600)':''}">${overdue}</div><div class="mc-sub">${overdue>0?'需立即處理':'目前正常'}</div></div>
  `;
  document.getElementById('ov-projects').innerHTML=state.projects.map(p=>{
    const pt=tasks.filter(t=>t.project===p.id);
    const h=projHealth(pt);const dn=pt.filter(t=>t.status==='done').length;
    const dg=pt.filter(t=>t.status==='doing').length;
    const avg=pt.length?Math.round(pt.reduce((a,t)=>a+(Number(t.progress)||0),0)/pt.length):0;
    return`<div class="proj-card">
      <div class="proj-top"><span style="font-size:14px;font-weight:700;color:var(--text)">${p.name}</span><span class="badge ${HEALTH_CLS[h]}">${HEALTH_LBL[h]}</span></div>
      <div class="proj-stats">
        <div><div class="pstat-val">${pt.length}</div><div class="pstat-lbl">總任務</div></div>
        <div><div class="pstat-val" style="color:var(--green-600)">${dn}</div><div class="pstat-lbl">完成</div></div>
        <div><div class="pstat-val" style="color:var(--amber-600)">${dg}</div><div class="pstat-lbl">進行中</div></div>
        <div><div class="pstat-val">${avg}%</div><div class="pstat-lbl">進度</div></div>
      </div>
      <div class="big-bar"><div class="big-fill" style="width:${avg}%;background:${BAR_COL[h]}"></div></div>
    </div>`;
  }).join('');
  const recent=[...logs].slice(0,7).reverse();
  const maxW=Math.max(...recent.map(r=>Number(r.totalWorkers)||0),1);
  document.getElementById('ov-trend').innerHTML=recent.length?recent.map(r=>`
    <div class="trend-row">
      <span style="font-size:11px;color:var(--text3);width:54px;flex-shrink:0">${String(r.date).slice(5)} ${WX[r.weather]||''}</span>
      <div class="tbar"><div class="tbar-fill" style="width:${Math.round((Number(r.totalWorkers)||0)/maxW*100)}%"></div></div>
      <span style="font-size:12px;font-weight:700;color:var(--text);width:26px;text-align:right">${r.totalWorkers}</span>
    </div>`).join(''):'<div style="text-align:center;color:var(--text4);padding:1rem;font-size:13px">尚無出工紀錄</div>';
  const risks=[];
  tasks.filter(t=>t.status!=='done'&&t.due&&new Date(t.due)<new Date()).forEach(t=>risks.push({c:'#E24B4A',title:`「${t.title}」已逾期`,meta:t.due}));
  tasks.filter(t=>t.status!=='done'&&t.due).forEach(t=>{const d=(new Date(t.due)-new Date())/864e5;if(d>=0&&d<=5)risks.push({c:'#EF9F27',title:`「${t.title}」剩 ${Math.round(d)} 天到期`,meta:t.due});});
  if(!risks.length)risks.push({c:'#1D9E75',title:'目前無重大風險',meta:'所有工項執行正常'});
  document.getElementById('ov-risks').innerHTML=risks.slice(0,4).map(r=>`
    <div class="risk-row"><div class="risk-dot" style="background:${r.c}"></div><div><div style="font-size:13px;font-weight:600;color:var(--text)">${r.title}</div><div style="font-size:11px;color:var(--text4);margin-top:2px">${r.meta}</div></div></div>`).join('');
  document.getElementById('ov-members').innerHTML=`<div class="g4">`+MEMBERS.map(m=>{
    const mt=tasks.filter(t=>t.assignees&&t.assignees.includes(m.id));
    const dp=mt.filter(t=>t.status==='done').length;
    const pct=mt.length?Math.round(dp/mt.length*100):0;
    const load=mt.filter(t=>t.status!=='done').length;
    const loadLbl=load===0?'閒置':load<=1?'正常':load<=2?'較忙':'過載';
    const loadCol=load===0?'var(--text4)':load<=1?'var(--green-600)':load<=2?'var(--amber-600)':'var(--red-600)';
    return`<div class="mem-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <div class="av ${m.cls}" style="width:28px;height:28px;font-size:11px">${m.name[0]}</div>
        <div><div style="font-size:13px;font-weight:700;color:var(--text)">${m.name}</div><div style="font-size:11px;color:${loadCol}">${loadLbl} · ${mt.length}項</div></div>
      </div>
      <div style="font-size:11px;color:var(--text4);margin-bottom:4px">完成率 ${pct}%</div>
      <div class="mbar"><div class="mbar-fill" style="width:${pct}%;background:${m.color}"></div></div>
    </div>`;
  }).join('')+'</div>';
}

/* ══ 任務看板 ══ */
function renderKanban(projFilter){
  const ft=document.getElementById('proj-filter-tabs');
  ft.innerHTML=`<button class="ftab ${!projFilter?'active':''}" onclick="renderKanban('')">全部</button>`+
    state.projects.map(p=>`<button class="ftab ${projFilter===p.id?'active':''}" onclick="renderKanban('${p.id}')">${p.name}</button>`).join('');
  const tasks=projFilter?state.tasks.filter(t=>t.project===projFilter):state.tasks;
  document.getElementById('kanban').innerHTML=[{k:'todo',l:'待辦'},{k:'doing',l:'進行中'},{k:'done',l:'已完成'}].map(col=>{
    const ct=tasks.filter(t=>t.status===col.k);
    return`<div class="task-col">
      <div class="col-header"><span class="col-lbl">${col.l}</span><span class="col-cnt">${ct.length}</span></div>
      ${ct.length===0?`<div style="text-align:center;padding:1.5rem;color:var(--text4);font-size:12px;border:1px dashed var(--border);border-radius:var(--r-md)"><i class="ti ti-inbox" style="font-size:22px;display:block;margin-bottom:6px"></i>暫無任務</div>`:ct.map(taskCard).join('')}
    </div>`;
  }).join('');
}
function taskCard(t){
  const proj=state.projects.find(p=>p.id===t.project);
  const isOver=t.status!=='done'&&t.due&&new Date(t.due)<new Date();
  const PL={high:'高',med:'中',low:'低'},PC={high:'b-err',med:'b-warn',low:'b-ok'};
  const due=t.due?new Date(t.due).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}):'';
  const avs=(t.assignees||[]).slice(0,3).map(id=>{const m=MEMBERS.find(m=>m.id===id);return m?`<div class="av ${m.cls}" title="${m.name}">${m.name[0]}</div>`:''}).join('');
  const prog=Number(t.progress)||0;
  return`<div class="task-card" onclick="editTask('${t.id}')">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <span class="badge ${PC[t.priority]}">${PL[t.priority]}優先</span>
      ${proj?`<span style="font-size:10px;color:var(--text4)">${proj.name}</span>`:''}
    </div>
    <div class="task-title">${t.title}</div>
    <div class="pi-bar" style="margin-top:6px"><div class="pi-fill" style="width:${prog}%"></div></div>
    <div class="task-foot">
      <div style="display:flex;gap:2px">${avs}</div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;color:var(--text4)">${prog}%</span>
        ${due?`<span style="font-size:11px;color:${isOver?'var(--red-600)':'var(--text4)'}"><i class="ti ti-calendar-due" style="font-size:11px"></i> ${due}</span>`:''}
      </div>
    </div>
  </div>`;
}

/* ══ 新增任務 ══ */
function openAddTask(){
  switchNav('tasks');
  const pOpts=state.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  const mOpts=MEMBERS.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  showModal(`
    <div class="modal-title"><span>新增任務</span><button class="btn sm" onclick="closeModal()" aria-label="關閉"><i class="ti ti-x"></i></button></div>
    <div class="field"><label>任務名稱</label><input id="nt-title" placeholder="輸入任務名稱..." autofocus></div>
    <div class="field-row">
      <div class="field"><label>狀態</label><select id="nt-status"><option value="todo">待辦</option><option value="doing">進行中</option><option value="done">已完成</option></select></div>
      <div class="field"><label>優先度</label><select id="nt-pri"><option value="high">高</option><option value="med">中</option><option value="low">低</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>所屬工程</label><select id="nt-proj">${pOpts}</select></div>
      <div class="field"><label>截止日期</label><input type="date" id="nt-due"></div>
    </div>
    <div class="field"><label>負責人員（可多選）</label><select id="nt-mem" multiple style="height:76px">${mOpts}</select></div>
    <button class="submit-btn" onclick="addTask()" style="margin-top:10px"><i class="ti ti-check"></i> 建立任務</button>
  `);
}
async function addTask(){
  const title=document.getElementById('nt-title').value.trim();
  if(!title){showToast('請輸入任務名稱');return;}
  const assignees=Array.from(document.getElementById('nt-mem').selectedOptions).map(o=>o.value);
  const task={id:'t'+Date.now(),title,status:document.getElementById('nt-status').value,priority:document.getElementById('nt-pri').value,project:document.getElementById('nt-proj').value,assignees,progress:0,due:document.getElementById('nt-due').value,createdAt:new Date().toISOString()};
  state.tasks.push(task);saveLocal();
  closeModal();renderKanban('');renderOverview();
  if(isOnline){try{await apiPost({action:'saveTask',...task});showToast('✅ 任務已儲存至 Google Sheets');}catch(e){showToast('⚠️ 已暫存本機');}}
  else showToast('✓ 任務已新增（離線）');
}

/* ══ 編輯任務 ══ */
function editTask(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const sO=['todo','doing','done'].map(s=>`<option value="${s}" ${t.status===s?'selected':''}>${{todo:'待辦',doing:'進行中',done:'已完成'}[s]}</option>`).join('');
  const pO=['high','med','low'].map(p=>`<option value="${p}" ${t.priority===p?'selected':''}>${{high:'高',med:'中',low:'低'}[p]}</option>`).join('');
  const mO=MEMBERS.map(m=>`<option value="${m.id}" ${t.assignees&&t.assignees.includes(m.id)?'selected':''}>${m.name}</option>`).join('');
  const prO=state.projects.map(p=>`<option value="${p.id}" ${t.project===p.id?'selected':''}>${p.name}</option>`).join('');
  showModal(`
    <div class="modal-title"><span>編輯任務</span><button class="btn sm" onclick="closeModal()" aria-label="關閉"><i class="ti ti-x"></i></button></div>
    <div class="field"><label>任務名稱</label><input id="et-title" value="${t.title}"></div>
    <div class="field-row">
      <div class="field"><label>狀態</label><select id="et-status">${sO}</select></div>
      <div class="field"><label>優先度</label><select id="et-pri">${pO}</select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>所屬工程</label><select id="et-proj">${prO}</select></div>
      <div class="field"><label>截止日期</label><input type="date" id="et-due" value="${t.due||''}"></div>
    </div>
    <div class="field"><label>負責人員（可多選）</label><select id="et-mem" multiple style="height:76px">${mO}</select></div>
    <div class="field"><label>完成進度 <strong id="et-pct-lbl">${t.progress}</strong>%</label>
      <input type="range" min="0" max="100" step="5" value="${t.progress}" id="et-prog" oninput="document.getElementById('et-pct-lbl').textContent=this.value" aria-label="完成進度"></div>
    <div style="display:flex;gap:8px;margin-top:10px;justify-content:space-between">
      <button class="btn danger" onclick="deleteTask('${id}')"><i class="ti ti-trash"></i> 刪除</button>
      <button class="submit-btn" style="flex:1" onclick="saveTask('${id}')"><i class="ti ti-device-floppy"></i> 儲存</button>
    </div>
  `);
}
async function saveTask(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  t.title=document.getElementById('et-title').value;t.status=document.getElementById('et-status').value;
  t.priority=document.getElementById('et-pri').value;t.project=document.getElementById('et-proj').value;
  t.due=document.getElementById('et-due').value;t.progress=+document.getElementById('et-prog').value;
  t.assignees=Array.from(document.getElementById('et-mem').selectedOptions).map(o=>o.value);
  if(t.status==='done')t.progress=100;
  saveLocal();closeModal();renderKanban('');renderOverview();
  if(isOnline){try{await apiPost({action:'saveTask',...t});showToast('✅ 任務已同步');}catch(e){showToast('⚠️ 已暫存本機');}}
  else showToast('✓ 任務已更新（離線）');
}
async function deleteTask(id){
  if(!confirm('確定刪除此任務？'))return;
  state.tasks=state.tasks.filter(t=>t.id!==id);saveLocal();closeModal();renderKanban('');renderOverview();
  if(isOnline){try{await apiPost({action:'deleteTask',id});showToast('任務已刪除');}catch(e){showToast('已刪除（本機）');}}
  else showToast('任務已刪除（離線）');
}

/* ══ 設定 ══ */
function renderSettingsLists(){
  const mkRow=(s,i,rmFn)=>`<div class="set-row"><span class="set-row-name">${s}</span><button class="btn sm danger" onclick="${rmFn}(${i})" aria-label="刪除"><i class="ti ti-trash" style="font-size:12px"></i></button></div>`;
  document.getElementById('sub-list').innerHTML=state.subcontractors.map((s,i)=>mkRow(s,i,'rmSub')).join('');
  document.getElementById('trade-list').innerHTML=state.trades.map((t,i)=>mkRow(t,i,'rmTrade')).join('');
  document.getElementById('proj-list').innerHTML=state.projects.map((p,i)=>`<div class="set-row"><span class="set-row-name">${p.name}</span><button class="btn sm danger" onclick="rmProj(${i})" aria-label="刪除"><i class="ti ti-trash" style="font-size:12px"></i></button></div>`).join('');
}
function addSub(){const n=prompt('新增分包商名稱：');if(!n||!n.trim())return;state.subcontractors.push(n.trim());saveLocal();renderSettingsLists();document.getElementById('log-sub').innerHTML=state.subcontractors.map(s=>`<option>${s}</option>`).join('');}
function rmSub(i){state.subcontractors.splice(i,1);saveLocal();renderSettingsLists();}
function addTrade(){const n=prompt('新增工種名稱：');if(!n||!n.trim())return;state.trades.push(n.trim());workerCounts[n.trim()]=0;saveLocal();renderSettingsLists();renderWTs();}
function rmTrade(i){const t=state.trades[i];state.trades.splice(i,1);delete workerCounts[t];saveLocal();renderSettingsLists();renderWTs();}
function addProj(){const n=prompt('新增工程專案名稱：');if(!n||!n.trim())return;const p={id:'p'+Date.now(),name:n.trim()};state.projects.push(p);saveLocal();renderSettingsLists();renderOverview();renderKanban('');if(isOnline)apiPost({action:'saveProject',...p}).catch(()=>{});}
function rmProj(i){if(!confirm('確定刪除此專案？'))return;const id=state.projects[i].id;state.projects.splice(i,1);saveLocal();renderSettingsLists();renderOverview();renderKanban('');if(isOnline)apiPost({action:'deleteProject',id}).catch(()=>{});}
function saveSettings(){
  state.siteName=document.getElementById('set-site').value.trim()||state.siteName;
  state.projNo=document.getElementById('set-no').value.trim()||state.projNo;
  saveLocal();applyConfig();showToast('✓ 設定已儲存本機');
}
async function pushConfigToSheets(){
  if(!isOnline){showToast('請先連線');return;}
  try{await apiPost({action:'saveConfig',siteName:state.siteName,projNo:state.projNo,subcontractors:state.subcontractors,trades:state.trades});showToast('✅ 設定已上傳至 Google Sheets');}
  catch(e){showToast('❌ 上傳失敗：'+e.message);}
}

/* ══ Modal ══ */
function showModal(html){
  let ma=document.getElementById('modal-area');
  if(!ma){ma=document.createElement('div');ma.id='modal-area';document.body.appendChild(ma);}
  ma.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()" role="dialog" aria-modal="true"><div class="modal">${html}</div></div>`;
}
function closeModal(){const ma=document.getElementById('modal-area');if(ma)ma.innerHTML='';}

/* ══ 導覽 ══ */
function switchNav(tab){
  ['overview','log','history','tasks','settings'].forEach(t=>{
    document.getElementById('view-'+t).style.display=t===tab?'block':'none';
    document.getElementById('nav-'+t).classList.toggle('active',t===tab);
  });
  window.scrollTo(0,0);
}

/* ══ Toast ══ */
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);
}

/* ══ CSS spin ══ */
const style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(style);

/* ══ 啟動 ══ */
loadLocal();initAll();
</script>
</body>
</html>
