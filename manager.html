<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程管理系統 — 主管</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B2A3B;--blue:#185FA5;--blue-l:#E6F1FB;--blue-m:#B5D4F4;
  --green:#0F6E56;--green-l:#E1F5EE;--amber:#854F0B;--amber-l:#FAEEDA;
  --red:#A32D2D;--red-l:#FCEBEB;--purple:#3C3489;--purple-l:#EEEDFE;
  --bg:#F2F4F7;--surface:#fff;--border:#DDE1E9;--border-l:#EEF0F5;
  --text:#18232F;--text2:#4A5568;--text3:#718096;--text4:#A0AEC0;
  --r:10px;--r-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.topnav{background:var(--navy);padding:0 32px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{display:flex;align-items:center;gap:8px;color:#fff;font-size:14px;font-weight:600;letter-spacing:.01em}
.logo-icon{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center}
.breadcrumb{display:flex;align-items:center;gap:6px;margin-left:12px;padding-left:12px;border-left:1px solid rgba(255,255,255,.15)}
.bc-item{font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;transition:color .15s}
.bc-item:hover{color:rgba(255,255,255,.85)}
.bc-sep{color:rgba(255,255,255,.25);font-size:12px}
.bc-cur{font-size:13px;color:#fff;font-weight:500}
.topnav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.role-badge{font-size:11px;background:rgba(24,95,165,.3);color:#B5D4F4;border:1px solid rgba(24,95,165,.4);border-radius:20px;padding:3px 10px;font-weight:500}
.nav-link{font-size:12px;color:rgba(255,255,255,.6);padding:5px 10px;border-radius:var(--r-sm);cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:1px solid transparent;transition:all .15s;background:transparent;font-family:inherit;white-space:nowrap}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-link.active{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.15)}
.user-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.65);cursor:pointer;padding:5px 10px;border:1px solid rgba(255,255,255,.15);border-radius:var(--r-sm);background:transparent;font-family:inherit;transition:all .15s}
.user-pill:hover{background:rgba(255,255,255,.1);color:#fff}
.btn{border:1px solid var(--border);background:var(--surface);border-radius:var(--r-sm);padding:7px 13px;font-size:12px;cursor:pointer;color:var(--text2);display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit;white-space:nowrap;font-weight:500}
.btn:hover{background:var(--bg);border-color:var(--text4)}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.pri:hover{background:#0C447C}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.btn.success:hover{background:#085041}
.btn.ghost{background:transparent;border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.7)}
.btn.ghost:hover{background:rgba(255,255,255,.1);color:#fff}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.danger{color:var(--red);border-color:#F7C1C1}
.btn.danger:hover{background:var(--red-l)}
.page{display:none;max-width:1400px;margin:0 auto;padding:20px 32px}
.page.active{display:block}
.page-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.page-sub{font-size:13px;color:var(--text3);margin-top:4px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-plan{background:var(--purple-l);color:var(--purple)}
.b-bid{background:var(--amber-l);color:var(--amber)}
.b-work{background:var(--blue-l);color:var(--blue)}
.b-chk{background:var(--green-l);color:var(--green)}
.b-pending{background:var(--amber-l);color:var(--amber)}
.b-approved{background:var(--green-l);color:var(--green)}
.b-rejected{background:var(--red-l);color:var(--red)}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.av-a{background:#C8DEFA;color:#0C447C}
.av-b{background:#A8EDD8;color:#085041}
.av-c{background:#F5C6D0;color:#72243E}
.av-d{background:#FAD7A0;color:#633806}
.av-e{background:#D5D2F9;color:#3C3489}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-val{font-size:26px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px}
.stat-lbl{font-size:12px;color:var(--text3);font-weight:500}
.stat-sub{font-size:11px;color:var(--text4);margin-top:4px}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;color:var(--text4);font-weight:500;padding:0 2px}
.filter-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:4px;font-family:inherit}
.chip:hover{border-color:var(--text4);color:var(--text)}
.chip.active{background:var(--blue-l);color:var(--blue);border-color:var(--blue)}
.chip.mgr-active{background:var(--purple-l);color:var(--purple);border-color:var(--purple)}
.mgr-filter-bar{display:none;align-items:center;gap:8px;background:var(--purple-l);border:1px solid #C5C2F0;border-radius:var(--r-sm);padding:8px 12px;margin-bottom:10px;font-size:13px;color:var(--purple)}
.mgr-filter-bar.show{display:flex}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bg)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.03em;text-transform:uppercase}
th.r,td.r{text-align:right}
td{padding:11px 14px;border-bottom:1px solid var(--border-l);color:var(--text);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr.proj-row{cursor:pointer;transition:background .12s}
tr.proj-row:hover{background:#F8FAFE}
tr.proj-row:hover .name-text{color:var(--blue)}
.name-cell{display:flex;align-items:center;gap:7px;white-space:normal;word-break:break-all}
.name-text{font-weight:600;color:var(--text);transition:color .15s}
.attach-pill{font-size:10px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:1px 6px;color:var(--text4);flex-shrink:0}
.mgr-chip{display:inline-flex;align-items:center;gap:4px;cursor:pointer;border-radius:20px;padding:3px 8px 3px 3px;border:1px solid transparent;transition:all .15s}
.mgr-chip:hover{background:var(--purple-l);border-color:#C5C2F0}
.mgr-chip.hl{background:var(--purple-l);border-color:#C5C2F0}
.prog-cell{display:flex;align-items:center;gap:6px}
.prog-track{flex:1;height:5px;background:var(--border-l);border-radius:5px;overflow:hidden;min-width:40px}
.prog-fill{height:100%;border-radius:5px}
.prog-num{font-size:11px;color:var(--text3);width:26px;text-align:right;flex-shrink:0}
.diff-pos{color:var(--green);font-weight:600}
.diff-neg{color:var(--red);font-weight:600}
.diff-zero{color:var(--text4)}
.detail-hero{background:var(--navy);border-radius:var(--r);padding:20px 24px;margin-bottom:16px;color:#fff}
.detail-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.detail-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:-.01em}
.detail-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.date-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ds{background:rgba(255,255,255,.08);border-radius:var(--r-sm);padding:12px 14px;border:1px solid rgba(255,255,255,.08)}
.ds-lbl{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:6px;display:flex;align-items:center;gap:4px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.ds-val{font-size:15px;font-weight:600;color:#fff}
.metrics-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px}
.metric-lbl{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:5px;letter-spacing:.03em;text-transform:uppercase}
.metric-val{font-size:20px;font-weight:700;color:var(--text);line-height:1}
.big-bar-wrap{margin-bottom:16px}
.big-bar-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:5px}
.big-bar{height:8px;background:var(--border-l);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.big-fill{height:100%;border-radius:8px;transition:width .5s}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{font-size:13px;padding:8px 16px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-weight:500;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-l)}
.task-item:last-child{border-bottom:none}
.task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.task-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.task-mini-bar{flex:0 0 56px;height:4px;background:var(--border-l);border-radius:4px;overflow:hidden}
.task-mini-fill{height:100%;border-radius:4px;background:var(--blue)}
.task-pct{font-size:11px;color:var(--text3);width:30px;text-align:right}
.task-due{font-size:11px;white-space:nowrap}
.file-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-l)}
.file-item:last-child{border-bottom:none}
.file-ico{width:38px;height:38px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ico-pdf{background:#FCEBEB;color:#791F1F}.ico-dwg{background:var(--purple-l);color:var(--purple)}
.ico-doc{background:var(--blue-l);color:var(--blue)}.ico-xls{background:var(--green-l);color:var(--green)}
.ico-img{background:var(--amber-l);color:var(--amber)}.ico-other{background:var(--bg);color:var(--text4)}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.file-meta{font-size:11px;color:var(--text4)}
.budget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.budget-item{background:var(--bg);border-radius:var(--r-sm);padding:14px;text-align:center;border:1px solid var(--border-l)}
.budget-lbl{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.budget-val{font-size:18px;font-weight:700;color:var(--text)}
.eng-hero{display:flex;align-items:center;gap:14px;background:var(--bg);border-radius:var(--r-sm);padding:14px;border:1px solid var(--border-l)}
.approval-item{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-l)}
.approval-item:last-child{border-bottom:none}
.approval-info{flex:1}
.approval-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.01em}
.approval-meta{font-size:12px;color:var(--text4);margin-bottom:6px}
.approval-note{font-size:13px;color:var(--text2);background:var(--bg);border-radius:var(--r-sm);padding:8px 12px;border:1px solid var(--border-l)}
.readonly-note{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text4);background:var(--bg);border:1px solid var(--border-l);border-radius:20px;padding:2px 8px}
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--r-sm);margin-bottom:16px;font-size:13px;line-height:1.5}
.alert-info{background:var(--blue-l);border:1px solid var(--blue-m);color:var(--blue)}
.empty{text-align:center;padding:2.5rem;color:var(--text4)}
.empty i{font-size:28px;display:block;margin-bottom:10px}
@media(max-width:680px){
  .stats,.metrics-row{grid-template-columns:1fr 1fr}
  .date-strip,.budget-grid{grid-template-columns:1fr}
  .page{padding:12px}.topnav{padding:0 12px}.nav-link{display:none}
}
</style>
</head>
<body>
<nav class="topnav">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-building-factory-2" style="color:#fff;font-size:15px"></i></div>
    工程管理系統
  </div>
  <div class="breadcrumb" id="breadcrumb"><span class="bc-cur">工程專案</span></div>
  <div class="topnav-right">
    <button class="nav-link active" id="nl-list" onclick="goPage('list')"><i class="ti ti-layout-dashboard"></i> 專案總覽</button>
    <button class="nav-link" id="nl-approve" onclick="goPage('approve')"><i class="ti ti-clipboard-check"></i> 審核申請 <span id="approve-badge" style="display:none;background:#E24B4A;color:#fff;border-radius:20px;padding:0 6px;font-size:10px;margin-left:2px"></span></button>
    <span class="role-badge"><i class="ti ti-building-community" style="font-size:11px"></i> 主管</span>
    <button class="user-pill" onclick="openChangePwModal()" title="點擊修改密碼"><i class="ti ti-user-circle" style="font-size:14px"></i> <span id="user-name">主管</span></button>
      <button class="nav-link" onclick="logout()" style="border:1px solid rgba(255,255,255,.2);padding:5px 12px"><i class="ti ti-logout"></i> 登出</button>
  </div>
</nav>

<!-- 主列表頁 -->
<div class="page active" id="page-list">
  <div class="page-hd">
    <div>
      <div class="page-title">工程專案執行狀況</div>
      <div class="page-sub" id="list-sub"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="readonly-note"><i class="ti ti-eye"></i> 主管視角為唯讀</span>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="mgr-filter-bar" id="mgr-bar">
    <div class="av" id="mgr-bar-av" style="width:24px;height:24px;font-size:11px"></div>
    <span id="mgr-bar-lbl"></span>
    <button class="btn sm" onclick="clearMgr()" style="margin-left:auto"><i class="ti ti-x"></i> 清除篩選</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th style="width:60px">編號</th>
        <th style="min-width:220px">專案名稱</th>
        <th style="width:90px">工程類型</th>
        <th style="width:90px">負責人</th>
        <th style="width:84px">狀態</th>
        <th style="width:106px">預計進度</th>
        <th style="width:106px">實際進度</th>
        <th style="width:48px" class="r">落差</th>
        <th style="width:96px" class="r">預算金額</th>
        <th style="width:96px" class="r">契約金額</th>
        <th style="width:88px">完工日</th>
        <th style="width:60px">詳情</th>
      </tr></thead>
      <tbody id="proj-tbody"></tbody>
    </table>
  </div>
</div>

<!-- 審核申請頁 -->
<div class="page" id="page-approve">
  <div class="page-hd">
    <div>
      <div class="page-title">新專案審核申請</div>
      <div class="page-sub">工程師送出的新專案申請，由主管核准或退回</div>
    </div>
  </div>
  <div class="section-card" id="approve-content"></div>
</div>

<!-- 詳情頁 -->
<div class="page" id="page-detail">
  <div id="detail-hero-wrap"></div>
  <div class="metrics-row" id="detail-metrics"></div>
  <div id="detail-prog-bar"></div>
  <div class="tab-bar" id="detail-tabs"></div>
  <div id="detail-content"></div>
</div>

<script src="api.js"></script>
<script>
// ── 登入守衛 ──
if (!requireAuth(['manager'])) { /* 已跳轉 */ }
const _cu = Auth.getUser();
if (_cu) { const n=document.getElementById('user-name'); if(n) n.textContent=_cu.name; }

// ── 狀態 ──
let PROJECTS  = [];
let ALL_USERS = [];
let ENG       = {};
let PENDING   = [];
let TASKS_CACHE = {};
let FILES_CACHE = {};
let REPORTS_CACHE = {};

const SCLS={規劃設計:'b-plan',工程發包:'b-bid',施工:'b-work',驗收:'b-chk'};
const TCOL={done:'#0F6E56',doing:'#185FA5',todo:'#A0AEC0'};
const TLBL={done:'已完成',doing:'進行中',todo:'待辦'};
const EXT_ICO={pdf:'ti-file-type-pdf',dwg:'ti-vector-triangle',dxf:'ti-vector-triangle',doc:'ti-file-type-doc',docx:'ti-file-type-doc',xls:'ti-file-spreadsheet',xlsx:'ti-file-spreadsheet',jpg:'ti-photo',jpeg:'ti-photo',png:'ti-photo'};
const EXT_CLS={pdf:'ico-pdf',dwg:'ico-dwg',dxf:'ico-dwg',doc:'ico-doc',docx:'ico-doc',xls:'ico-xls',xlsx:'ico-xls',jpg:'ico-img',jpeg:'ico-img',png:'ico-img'};
const AV_COLORS=['av-a','av-b','av-c','av-d','av-e'];

const fmt    = n => n ? '$'+Number(n).toLocaleString() : '—';
const remain = p => (p.budget&&p.contract) ? p.budget-p.contract : null;
const diff   = p => (p.realPct||0)-(p.planPct||0);
const diffStr= d => d===0?'—':(d>0?'+':'')+d+'%';
const diffCls= d => d>0?'diff-pos':d<0?'diff-neg':'diff-zero';
const noWork = p => ['規劃設計','工程發包'].includes(p.status);
const progCol= (r,pl)=>{const d=r-pl;return d<-10?'var(--red)':d<0?'var(--amber)':'var(--blue)'};
const taskAvg= t=>t.length?Math.round(t.reduce((a,x)=>a+(x.progress||0),0)/t.length):0;
const isOver = t=>t.status!=='done'&&t.due&&new Date(t.due)<new Date();
const avCls  = id=>{const i=parseInt((id||'').replace(/\D/g,''))||0;return AV_COLORS[i%5];};
const engName= id=>(ENG[id]||{}).name||id||'—';

let filterStatus='全部', filterMgr='', activeTab={}, activeProjId=null;

// ── 初始載入 ──
async function init(retry=0) {
  try {
    const pr = await callAPI({action:'getProjects'});
    const ur = await callAPI({action:'getUsers'});
    PROJECTS  = pr.success ? pr.projects : [];
    ALL_USERS = ur.success ? ur.users    : [];
    ENG = {};
    ALL_USERS.forEach(u => {
      ENG[u.id] = { name: u.name, role: u.role, cls: avCls(u.id) };
    });
    // 待審核 = 申請狀態為 pending 的專案
    PENDING = PROJECTS.filter(p => p.applyStatus === 'pending');
    updateApproveBadge();
    goPage('list');
  } catch(e) {
    console.error('init error:', e);
    if (retry < 2) {
      setTimeout(() => init(retry+1), 2000);
    } else {
      document.getElementById('page-list').innerHTML = `
        <div style="text-align:center;padding:5rem 2rem">

function updateApproveBadge(){
  const b=document.getElementById('approve-badge');
  if(PENDING.length>0){b.style.display='inline';b.textContent=PENDING.length;}
  else b.style.display='none';
}

function goPage(id,projId){
  if(projId!==undefined) activeProjId=projId;
  ['list','approve','detail'].forEach(p=>document.getElementById('page-'+p).classList.toggle('active',p===id));
  ['list','approve'].forEach(k=>{const b=document.getElementById('nl-'+k);if(b)b.classList.toggle('active',k===id);});
  const bc=document.getElementById('breadcrumb');
  if(id==='detail'&&activeProjId){
    const p=PROJECTS.find(x=>x.id===activeProjId);
    bc.innerHTML=`<span class="bc-item" onclick="goPage('list')">工程專案</span><span class="bc-sep"><i class="ti ti-chevron-right" style="font-size:12px"></i></span><span class="bc-cur">${p?p.name:''}</span>`;
    renderDetail(activeProjId);
  } else {
    const labels={list:'工程專案',approve:'審核申請'};
    bc.innerHTML=`<span class="bc-cur">${labels[id]||id}</span>`;
  }
  if(id==='list'){renderStats();renderFilters();renderTable();}
  if(id==='approve') renderApprove();
  window.scrollTo(0,0);
}

function renderFilters(){
  const sts=['全部','規劃設計','工程發包','施工','驗收'];
  const mgrMap = {};
  PROJECTS.forEach(p => { if(p.mgrId && p.mgrName) mgrMap[p.mgrId] = p.mgrName; });
  const mgrChips = Object.entries(mgrMap).map(([id,name]) => {
    const cls = (ENG[id]||{}).cls || 'av-a';
    return `<button class="chip${filterMgr===id?' mgr-active':''}" onclick="setMgr('${id}')" style="display:flex;align-items:center;gap:4px" title="點擊查看 ${name} 的統計">
      <div class="av ${cls}" style="width:16px;height:16px;font-size:7px">${name[0]}</div>${name}
    </button>`;
  }).join('');
  document.getElementById('filter-bar').innerHTML=
    `<span class="filter-label">狀態</span>`+
    sts.map(s=>`<button class="chip${filterStatus===s?' active':''}" onclick="setSts('${s}')">${s}</button>`).join('')+
    `<div class="filter-sep"></div><span class="filter-label">負責人</span>`+mgrChips;
  const mb=document.getElementById('mgr-bar');
  if(filterMgr){
    const mgrProjs = PROJECTS.filter(p=>p.mgrId===filterMgr);
    const mgrName  = (mgrProjs[0]||{}).mgrName || filterMgr;
    const cls      = (ENG[filterMgr]||{}).cls || 'av-a';
    const totContract = mgrProjs.reduce((a,p)=>a+Number(p.contract||0),0);
    const totBudget   = mgrProjs.reduce((a,p)=>a+Number(p.budget||0),0);
    mb.classList.add('show');
    const av=document.getElementById('mgr-bar-av');
    av.textContent=mgrName[0]; av.className='av '+cls;
    av.style.cssText='width:24px;height:24px;font-size:11px';
    document.getElementById('mgr-bar-lbl').innerHTML=
      `<strong>${mgrName}</strong> 負責專案：<strong>${mgrProjs.length} 個</strong>
       &nbsp;·&nbsp; 預算總額：<strong>${totBudget?'$'+Math.round(totBudget/10000)+'萬':'—'}</strong>
       &nbsp;·&nbsp; 契約總額：<strong>${totContract?'$'+Math.round(totContract/10000)+'萬':'—'}</strong>`;
  } else mb.classList.remove('show');
}
function setSts(s){filterStatus=s;renderFilters();renderTable();}
function setMgr(id){filterMgr=filterMgr===id?'':id;renderFilters();renderTable();}

function renderApprove(){
  const el=document.getElementById('approve-content');
  if(!PENDING.length){
    el.innerHTML=`<div class="section-hd"><span class="section-title">待審核（0）</span></div><div class="empty"><i class="ti ti-check-circle"></i>目前無待審核申請</div>`;
    return;
  }
  el.innerHTML=`<div class="section-hd"><span class="section-title">待審核（${PENDING.length}）</span></div>`+
  PENDING.map(p=>{
    const e=ENG[p.mgrId]||{};
    return`<div class="approval-item">
      <div class="av ${e.cls||'av-a'}" style="width:40px;height:40px;font-size:16px;flex-shrink:0">${(e.name||'?')[0]}</div>
      <div class="approval-info">
        <div class="approval-name">${p.name}</div>
        <div class="approval-meta">申請人：${p.mgrName||e.name||p.mgrId} · ${(p.createdAt||'').slice(0,10)} · 預算：${p.budget?fmt(p.budget):'未填'}</div>
        <div class="approval-note">專案申請狀態：等待主管審核</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;align-items:flex-end">
        <span class="badge b-pending"><i class="ti ti-clock" style="font-size:10px"></i> 待審核</span>
        <button class="btn sm success" onclick="doApprove('${p.id}',true)"><i class="ti ti-check"></i> 核准</button>
        <button class="btn sm danger"  onclick="doApprove('${p.id}',false)"><i class="ti ti-x"></i> 退回</button>
      </div>
    </div>`;
  }).join('');
}

async function doApprove(id, approved){
  try {
    const res = await API.approveProject(id, approved);
    if(res.success){
      // 更新本地資料
      const p = PROJECTS.find(x=>x.id===id);
      if(p) p.applyStatus = approved ? 'approved' : 'rejected';
      PENDING = PROJECTS.filter(p=>p.applyStatus==='pending');
      updateApproveBadge();
      showToast(approved?'✓ 已核准，工程師將收到通知':'已退回申請，工程師將收到通知', approved?'success':'warn');
      renderApprove();
      renderStats();
    } else showToast(res.error||'操作失敗','error');
  } catch(e){ showToast('連線失敗','error'); }
}

      <div class="eng-hero">
        <div class="av ${e.cls||'av-a'}" style="width:44px;height:44px;font-size:18px">${(e.name||'?')[0]}</div>
        <div style="flex:1"><div style="font-size:16px;font-weight:700;margin-bottom:3px">${e.name||'—'}</div><div style="font-size:13px;color:var(--text3)">${e.role||''}</div></div>
        <button class="btn sm" onclick="setMgr('${p.mgrId}');goPage('list')"><i class="ti ti-filter"></i> 查看所有專案</button>
      </div>
      ${others.length?`<div style="margin-top:14px"><div class="section-hd" style="margin-bottom:8px"><span class="section-title">其他負責專案（${others.length}）</span></div>
        ${others.map(x=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-l);cursor:pointer" onclick="goPage('detail','${x.id}')">
          <span style="font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px"><i class="ti ti-chevron-right" style="font-size:12px;color:var(--text4)"></i>${x.name}</span>
          <span class="badge ${SCLS[x.status]||'b-plan'}">${x.status}</span>
        </div>`).join('')}</div>`:''}
    </div>`;
  }
  document.getElementById('detail-content').innerHTML=html;
}

function getMgrReportData(projId) {
  const rpt = (REPORTS_CACHE[projId]||[])[0];
  const p   = PROJECTS.find(x=>x.id===projId);
  return rpt && p ? { rpt, p } : null;
}

function exportMgrPDF(projId) {
  const rpt = (REPORTS_CACHE[projId]||[])[0];
  const p   = PROJECTS.find(x=>x.id===projId);
  if (!rpt || !p) return;
  const progRows = (rpt.progress||[]).map(pg=>`<tr><td style="width:100px;white-space:nowrap;color:#555">${pg.date}</td><td style="white-space:pre-wrap;line-height:1.6">${pg.note}</td></tr>`).join('');
  const html=`<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>工作報告</title>
  <style>body{font-family:'Noto Sans TC',sans-serif;font-size:13px;margin:20px}
  table{width:100%;border-collapse:collapse;margin-bottom:14px}
  th,td{border:1px solid #DDE1E9;padding:8px 12px}th{background:#F2F4F7;font-weight:600;width:100px}</style></head><body>
  <h2 style="margin-bottom:16px">工作報告 — ${p.name}</h2>
  <table>
    <tr><th>案件編號</th><td>${rpt.caseNo||'—'}</td><th>供應商</th><td>${rpt.vendor||'—'}</td></tr>
    <tr><th>案件狀態</th><td>${rpt.status||'—'}</td><th>DRI</th><td>${rpt.dri||'—'}</td></tr>
  </table>
  <h4>需求說明</h4><table><tr><td style="white-space:pre-wrap">${rpt.requirement||'—'}</td></tr></table>
  <h4>進度說明</h4><table style="table-layout:fixed;width:100%"><colgroup><col style="width:100px"><col></colgroup><tr><th style="width:100px">日期</th><th>說明</th></tr>${progRows||'<tr><td colspan="2">—</td></tr>'}</table>
  <h4>待處置事項</h4><table><tr><td style="white-space:pre-wrap">${rpt.pending||'—'}</td></tr></table>
  </body></html>`;
  const win=window.open('','_blank');win.document.write(html);win.document.close();setTimeout(()=>win.print(),500);
}

function exportMgrWord(projId) {
  const d = getMgrReportData(projId);
  if (!d) return;
  const { rpt, p } = d;
  const progRows = (rpt.progress||[]).map(pg=>
    `<tr>
      <td style="width:100px;white-space:nowrap;color:#555;padding:7px 10px;border:1px solid #DDE1E9">${pg.date}</td>
      <td style="white-space:pre-wrap;line-height:1.6;padding:7px 10px;border:1px solid #DDE1E9">${pg.note}</td>
    </tr>`
  ).join('') || '<tr><td colspan="2" style="border:1px solid #DDE1E9;padding:7px 10px">—</td></tr>';

  const html = `
    <html xmlns:o="urn:schemas-microsoft-com:office:office"
          xmlns:w="urn:schemas-microsoft-com:office:word"
          xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="UTF-8">
    <style>
      body{font-family:'新細明體',serif;font-size:12pt;margin:2cm}
      h1{font-size:16pt;font-weight:bold;border-bottom:2px solid #000;padding-bottom:6pt;margin-bottom:12pt}
      h3{font-size:11pt;font-weight:bold;margin:12pt 0 4pt;color:#444}
      table{width:100%;border-collapse:collapse;margin-bottom:12pt}
      th{background:#EEE;border:1px solid #DDD;padding:6px 8px;font-size:11pt;text-align:left;width:80px}
      td{border:1px solid #DDD;padding:6px 8px;font-size:11pt;vertical-align:top}
    </style></head><body>
    <h1>工作報告</h1>
    <table>
      <tr><th>案件編號</th><td>${rpt.caseNo||'—'}</td><th>供應商</th><td>${rpt.vendor||'—'}</td></tr>
      <tr><th>交辦來源</th><td>${rpt.source||'—'}</td><th>週期</th><td>${rpt.period||'—'}</td></tr>
      <tr><th>案件狀態</th><td>${rpt.status||'—'}</td><th>持續追蹤</th><td>${rpt.tracking||'—'}</td></tr>
      <tr><th>DRI</th><td>${rpt.dri||'—'}</td><th>經辦單位</th><td>${rpt.unit||'—'}</td></tr>
    </table>
    <h3>工作項目</h3>
    <table><tr><td style="font-weight:bold">${p.name}</td></tr></table>
    <h3>需求說明</h3>
    <table><tr><td style="white-space:pre-wrap;line-height:1.8">${rpt.requirement||'—'}</td></tr></table>
    <h3>進度說明</h3>
    <table style="table-layout:fixed;width:100%"><colgroup><col style="width:100px"><col></colgroup><tr><th style="width:100px">日期</th><th>說明</th></tr>${progRows}</table>
    <h3>待處置事項</h3>
    <table><tr><td style="white-space:pre-wrap;line-height:1.8">${rpt.pending||'—'}</td></tr></table>
    </body></html>`;

  const blob = new Blob([html], { type: 'application/msword;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `工作報告_${p.name}_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.doc`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Word 檔案已下載', 'success');
}

function switchTab(id,tab){activeTab[id]=tab;renderDetail(id);}

const _s=document.createElement('style');
_s.textContent='@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
document.head.appendChild(_s);

// ── 啟動 ──
init();
</script>
</body>
