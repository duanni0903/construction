<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程管理系統 — 登入</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B2A3B;--blue:#185FA5;--blue-l:#E6F1FB;--blue-m:#B5D4F4;
  --green:#0F6E56;--green-l:#E1F5EE;--amber:#854F0B;--amber-l:#FAEEDA;
  --red:#A32D2D;--red-l:#FCEBEB;--purple:#3C3489;--purple-l:#EEEDFE;
  --bg:#F2F4F7;--surface:#fff;--border:#DDE1E9;--border-l:#EEF0F5;
  --text:#18232F;--text2:#4A5568;--text3:#718096;--text4:#A0AEC0;
  --r:10px;--r-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.topnav{background:var(--navy);padding:0 20px;height:52px;display:flex;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{display:flex;align-items:center;gap:8px;color:#fff;font-size:14px;font-weight:600;letter-spacing:.01em}
.logo-icon{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px;width:400px;max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.01em;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
.field{margin-bottom:14px}
.field label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.field input{width:100%;padding:9px 12px;border-radius:var(--r-sm);border:1px solid var(--border);font-size:13px;font-family:inherit;color:var(--text);transition:border-color .15s}
.field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.err{font-size:12px;color:var(--red);margin-top:6px;display:none}
.login-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.login-btn:hover{background:#0C447C}

.login-btn:disabled{opacity:.7;cursor:not-allowed}
.footer{text-align:center;padding:16px;font-size:11px;color:var(--text4)}
</style>
</head>
<body>
<nav class="topnav">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-building-factory-2" style="color:#fff;font-size:15px"></i></div>
    工程管理系統
  </div>
</nav>
<div class="wrap">
  <div class="login-box">
    <div class="login-title">登入系統</div>
    <div class="login-sub">請輸入你的帳號與密碼</div>
    <div class="field">
      <label for="email">帳號（Email）</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="username">
    </div>
    <div class="field">
      <label for="pw">密碼</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
      <div class="err" id="err">帳號或密碼錯誤，請再試一次</div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);cursor:pointer;margin-bottom:4px">
      <input type="checkbox" id="remember" style="width:14px;height:14px;cursor:pointer">
      記住帳號與密碼
    </label>
    <button class="login-btn" onclick="doLogin()"><i class="ti ti-login"></i> 登入</button>

  </div>
</div>
<div class="footer">© 2025 工程管理系統 · Demo 版本</div>
<script src="api.js"></script>
<script>
const ROLE_FILE = {
  admin:'admin.html', manager:'manager.html',
  engineer:'engineer.html', subcontractor:'subcontractor.html'
};

function redirectByRole(role) {
  const file = ROLE_FILE[role] || 'login.html';
  // replace 不留歷史記錄，避免上一頁回到登入頁
  window.location.replace(file + '?t=' + Date.now());
}

// 已登入則直接跳轉
if (Auth.isLoggedIn()) redirectByRole(Auth.getUser().role);

// 載入記住的帳號密碼
const _saved = localStorage.getItem('cm_saved_email');
const _savedPw = localStorage.getItem('cm_saved_pw');
if (_saved) {
  document.getElementById('email').value = _saved;
  document.getElementById('remember').checked = true;
}
if (_savedPw) {
  document.getElementById('pw').value = _savedPw;
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('pw').value;
  const errEl = document.getElementById('err');
  const btn   = document.querySelector('.login-btn');

  if (!email || !pw) { errEl.textContent='請輸入帳號與密碼'; errEl.style.display='block'; return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> 登入中...';

  try {
    const res = await API.login(email, pw);
    if (res.success) {
      // 記住帳號與密碼
      if (document.getElementById('remember').checked) {
        localStorage.setItem('cm_saved_email', email);
        localStorage.setItem('cm_saved_pw', pw);
      } else {
        localStorage.removeItem('cm_saved_email');
        localStorage.removeItem('cm_saved_pw');
      }
      Auth.clear(); // 先清除舊 session
      Auth.save(res.token, res.user);
      errEl.style.display = 'none';
      redirectByRole(res.user.role);
    } else {
      errEl.textContent = res.error || '帳號或密碼錯誤';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-login"></i> 登入';
    }
  } catch(e) {
    errEl.textContent = '無法連線，請檢查網路';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i> 登入';
  }
}



document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// spin 動畫
const s = document.createElement('style');
s.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
document.head.appendChild(s);
</script>
</body>
</html>
