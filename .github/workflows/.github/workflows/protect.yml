name: PR 審查檢查

on:
  pull_request:
    branches:
      - main

jobs:
  pr-check:
    name: PR 合併前檢查
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 檢查必要檔案
        run: |
          for f in login.html engineer.html manager.html admin.html subcontractor.html api.js; do
            if [ ! -f "$f" ]; then
              echo "::error::缺少檔案：$f"
              exit 1
            fi
            echo "✅ $f 存在"
          done

      - name: 檢查 api.js 設定
        run: |
          grep -q "API_URL" api.js && echo "✅ API_URL 存在" || (echo "::error::缺少 API_URL" && exit 1)
