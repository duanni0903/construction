name: PR 審查檢查

on:
  pull_request:
    branches:
      - main

jobs:
  pr-check:
    name: PR 合併前檢查
    runs-on: ubuntu-latest

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 確認 PR 描述不為空
        run: |
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            echo "::warning::PR 描述為空，建議填寫更新內容"
          else
            echo "✅ PR 有描述"
          fi

      - name: 檢查必要檔案是否存在
        run: |
          FILES=(login.html engineer.html manager.html admin.html subcontractor.html api.js)
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::缺少檔案：$f"
              exit 1
            else
              echo "✅ $f 存在"
            fi
          done

      - name: 檢查 api.js 是否包含 API_URL
        run: |
          if grep -q "API_URL" api.js; then
            echo "✅ api.js 包含 API_URL"
          else
            echo "::error::api.js 缺少 API_URL 設定"
            exit 1
          fi

      - name: 提醒 Apps Script 更新
        run: |
          if git diff --name-only origin/main...HEAD | grep -q "Code.gs"; then
            echo "::warning::Code.gs 有變更，記得重新部署 Apps Script！"
            echo "## ⚠️ 注意" >> $GITHUB_STEP_SUMMARY
            echo "Code.gs 有變更，合併後請：" >> $GITHUB_STEP_SUMMARY
            echo "1. Apps Script 建立新版本" >> $GITHUB_STEP_SUMMARY
            echo "2. 重新部署 Web App" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Code.gs 無變更"
          fi

      - name: 產出 PR 摘要
        run: |
          echo "## 📝 PR 檢查完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 檔案 | 大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in login.html engineer.html manager.html admin.html subcontractor.html api.js; do
            if [ -f "$f" ]; then
              SIZE=$(wc -c < "$f" | awk '{printf "%.1f KB", $1/1024}')
              echo "| $f | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done
