# ================================================================
#  工程管理系統 — GitHub Actions CI/CD
#  觸發時機：
#    - develop 分支：執行語法檢查 + 通知
#    - main 分支：執行檢查 + 自動部署到 GitHub Pages
# ================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1：語法與結構檢查 ──────────────────────────────────────
  check:
    name: 檢查檔案結構與語法
    runs-on: ubuntu-latest

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 檢查必要檔案是否存在
        run: |
          echo "🔍 檢查必要檔案..."
          FILES=(
            "login.html"
            "engineer.html"
            "manager.html"
            "admin.html"
            "subcontractor.html"
            "api.js"
          )
          MISSING=0
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ 缺少檔案：$f"
              MISSING=1
            else
              echo "✅ $f"
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "::error::有必要檔案缺失，請確認後重新推送"
            exit 1
          fi

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安裝 html-validate
        run: npm install -g html-validate

      - name: 建立 html-validate 設定
        run: |
          cat > .htmlvalidate.json << 'HVCFG'
          {
            "extends": ["html-validate:recommended"],
            "rules": {
              "no-trailing-whitespace": "off",
              "long-title": "off",
              "no-inline-style": "off",
              "require-sri": "off",
              "script-type": "off",
              "attribute-boolean-style": "off",
              "void-style": "off",
              "prefer-native-element": "off",
              "no-redundant-role": "off",
              "aria-label-misuse": "off"
            }
          }
          HVCFG

      - name: 驗證 HTML 語法
        run: |
          echo "🔍 驗證 HTML 語法..."
          ERRORS=0
          for f in login.html engineer.html manager.html admin.html subcontractor.html; do
            echo "  檢查 $f..."
            html-validate "$f" || ERRORS=1
          done
          if [ $ERRORS -eq 1 ]; then
            echo "::warning::HTML 語法有警告，請確認"
          else
            echo "✅ HTML 語法檢查通過"
          fi
        continue-on-error: true

      - name: 檢查 api.js 是否包含 API_URL
        run: |
          echo "🔍 檢查 api.js 設定..."
          if grep -q "API_URL" api.js; then
            echo "✅ api.js 包含 API_URL 設定"
          else
            echo "::error::api.js 缺少 API_URL 設定"
            exit 1
          fi

      - name: 檢查各頁面是否引入 api.js
        run: |
          echo "🔍 檢查各頁面是否引入 api.js..."
          PAGES=(login.html engineer.html manager.html admin.html)
          for f in "${PAGES[@]}"; do
            if grep -q "api.js" "$f"; then
              echo "✅ $f 已引入 api.js"
            else
              echo "::warning::$f 尚未引入 api.js"
            fi
          done

      - name: 產出檢查摘要
        run: |
          echo "## ✅ CI 檢查完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 檔案 | 大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in login.html engineer.html manager.html admin.html subcontractor.html api.js; do
            SIZE=$(wc -c < "$f" | awk '{printf "%.1f KB", $1/1024}')
            echo "| $f | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "分支：\`${{ github.ref_name }}\` | 提交：\`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Job 2：部署（只在 main 分支執行）─────────────────────────
  deploy:
    name: 部署到 GitHub Pages
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上傳網站檔案
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 部署完成通知
        run: |
          echo "## 🚀 部署完成！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "網址：${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "部署時間：$(date '+%Y/%m/%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
